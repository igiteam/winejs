<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting</title>
    <!-- Meta refresh redirect (instant, but shows a brief message) -->
    <meta http-equiv="refresh" content="0; url=https://igiteam.github.io/Nintendo64/?demo">
    <!-- Optional: JavaScript redirect for better control -->
    <script>
        // Instant redirect using JavaScript (window.location replaces current page)
        window.location.replace("https://igiteam.github.io/Nintendo64/?demo");
    </script>
</head>

<body>
</body>

</html>
