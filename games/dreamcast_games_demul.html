    <link rel="icon" href="https://cdn.sdappnet.cloud/rtx/images/dreamcast-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://cdn.sdappnet.cloud/rtx/images/dreamcast-icon.png" sizes="180x180">
    <link rel="icon" type="image/png" href="https://cdn.sdappnet.cloud/rtx/images/dreamcast-icon.png" sizes="192x192">
    <link rel="icon" type="image/png" href="https://cdn.sdappnet.cloud/rtx/images/dreamcast-icon.png" sizes="512x512">
    <style>
        body {
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 4px 20px;
            padding: 0;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto;
            background-color: #1a1a1a;
            margin-top: 4px;
            z-index: 1000;
        }

        .dreamcast-card {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }

        .dreamcast-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .dreamcast-card-container {
            width: 100%;
            position: relative;
        }

        .dreamcast-card-image-container {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #1a1a1a;
            position: relative;
        }

        .dreamcast-card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .dreamcast-title {
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 14px;
            background: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dreamcast-play-link {
            display: block;
            width: 100%;
            text-align: center;
            padding: 8px;
            background: #ff9900;
            color: white !important;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .dreamcast-play-link:hover {
            background: #e68a00;
        }

        /* Search container */
        .saved-search-container {
            position: relative;
            top: 0;
            z-index: 10000;
            margin-left: auto;
            margin-right: auto;
            margin: 8px 0px;
        }

        .saved-search-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .saved-search-input {
            padding: 10px;
            width: calc(100% - 20px);
            border: 1px solid #555;
            border-radius: 4px;
            background: #444;
            color: white;
            flex: 1;
            font-size: 16px;
        }

        .saved-search-input::placeholder {
            color: #aaa;
        }

        .saved-results-count {
            color: white;
            font-size: 14px;
            text-align: center;
            margin-top: 5px;
        }

        .hidden-game {
            display: none !important;
        }

        .highlight-saved {
            border: 3px solid #42991b;
            box-shadow: 0 0 15px #42991b;
        }

        .icon {
            width: 34px;
            height: 34px;
            border-radius: 4px;
            object-fit: cover;
        }

        .total-count {
            color: #888;
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>

    <script>
        // Function to handle play button clicks
        function handlePlayClick(event) {
            event.stopPropagation(); // Prevent card click from also firing
            const formattedTitle = this.getAttribute('data-play-title');
            if (formattedTitle) {
                window.open('https://wine.sdappnet.cloud/dreamcast/' + formattedTitle, '_blank');
            }
            return false;
        }

        // Function to handle card clicks (when clicking on image or title)
        function handleCardClick(event) {
            // Don't trigger if clicking on the play button
            if (event.target.classList.contains('dreamcast-play-link')) {
                return;
            }

            const card = this;
            const formattedTitle = card.getAttribute('data-formatted-title');
            if (formattedTitle) {
                window.open('https://wine.sdappnet.cloud/dreamcast/' + formattedTitle, '_blank');
            }
        }

        // Add event listeners after DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Add click handlers to cards
            document.querySelectorAll('.dreamcast-card').forEach(card => {
                card.addEventListener('click', handleCardClick);
            });

            // Add click handlers to play buttons
            document.querySelectorAll('.dreamcast-play-link').forEach(button => {
                button.addEventListener('click', handlePlayClick);
            });
        });

        // Search functionality
        document.getElementById('saved-search-input').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.dreamcast-card');
            let count = 0;

            cards.forEach(card => {
                const title = card.getAttribute('data-title') || '';
                if (title.toLowerCase().includes(searchTerm) && searchTerm) {
                    card.classList.remove('hidden-game');
                    card.classList.add('highlight-saved');
                    count++;
                } else if (searchTerm) {
                    card.classList.add('hidden-game');
                    card.classList.remove('highlight-saved');
                } else {
                    card.classList.remove('hidden-game');
                    card.classList.remove('highlight-saved');
                }
            });

            document.getElementById('saved-results-count').textContent =
                searchTerm ? `Found ${count} game${count !== 1 ? 's' : ''}` : '';
        });
    </script>
