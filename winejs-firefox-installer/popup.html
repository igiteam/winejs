<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WINEJS Installer</title>
  <style>
    /* System font stack - works everywhere */
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      margin: 0;
    }
    /* popup.html - same system font stack */
    body, 
    .container, 
    .header-text h1, 
    .header-text p, 
    .toggle-label, 
    .status-value, 
    .footer {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
    }
    
    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 2px 0;
      color: #fff;
    }
    
    .header-text p {
      font-size: 11px;
      margin: 0;
      color: #999;
    }
    
    /* Toggle Switch */
    .toggle-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #252525;
      border-radius: 8px;
    }
    
    .toggle-label span {
      font-size: 13px;
      font-weight: 500;
    }
    
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      transition: .2s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #3b8cff;
    }
    
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    /* Status */
    .status {
      padding: 12px;
      background: #252525;
      border-radius: 8px;
      font-size: 13px;
    }
    
    .status-label {
      color: #aaa;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
    }
    
    .status-value {
      color: #6eca8b;
      font-weight: 500;
    }
    
    .footer {
      font-size: 10px;
      color: #555;
      text-align: center;
    }
    
    .footer a {
      color: #3b8cff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
    <img src="icons/icon.png" class="logo" alt="WINEJS">
    <div class="header-text">
        <h1>WINEJS Installer</h1>
        <p>Digital Ocean · OS install · <a href="https://cloud.digitalocean.com/droplets" target="_blank" style="color: #3b8cff; text-decoration: none;">Droplets💽</a></p>
    </div>
    </div>
    
    <div class="toggle-section">
      <span class="toggle-label">Show overlay on terminal</span>
      <label class="switch">
        <input type="checkbox" id="overlayToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="status">
      <div class="status-label">Status</div>
      <div class="status-value" id="statusMessage">Waiting for connection...</div>
    </div>
    <div class="footer">
      <a href="https://igiteam.github.io/sh/" target="_blank">Support</a> · v1.0
    </div>
    <!-- DigitalOcean Referral Badge - flex centered with margin 2px -->
    <div style="display: flex; justify-content: center; margin: 2px;">
        <a href="https://www.digitalocean.com/?refcode=582fcc29135e&utm_campaign=Referral_Invite&utm_medium=Referral_Program&utm_source=badge"><img src="https://web-platforms.sfo2.cdn.digitaloceanspaces.com/WWW/Badge%203.svg" alt="DigitalOcean Referral Badge" /></a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
